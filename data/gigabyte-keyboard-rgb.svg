<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="33%" stop-color="#51cf66"/>
      <stop offset="66%" stop-color="#339af0"/>
      <stop offset="100%" stop-color="#cc5de8"/>
    </linearGradient>
  </defs>
  <!-- Keyboard body -->
  <rect x="6" y="22" width="52" height="28" rx="4" ry="4" fill="#2d2d2d"/>
  <rect x="8" y="14" width="48" height="6" rx="2" ry="2" fill="#3d3d3d"/>
  <!-- RGB glow on keys -->
  <rect x="9" y="25" width="7" height="6" rx="1" ry="1" fill="#ff6b6b" opacity="0.9"/>
  <rect x="18" y="25" width="7" height="6" rx="1" ry="1" fill="#51cf66" opacity="0.9"/>
  <rect x="27" y="25" width="7" height="6" rx="1" ry="1" fill="#fcc419" opacity="0.9"/>
  <rect x="36" y="25" width="7" height="6" rx="1" ry="1" fill="#339af0" opacity="0.9"/>
  <rect x="45" y="25" width="7" height="6" rx="1" ry="1" fill="#cc5de8" opacity="0.9"/>
  <!-- Bottom row keys slightly dimmer -->
  <rect x="9" y="33" width="7" height="6" rx="1" ry="1" fill="#ff6b6b" opacity="0.6"/>
  <rect x="18" y="33" width="7" height="6" rx="1" ry="1" fill="#51cf66" opacity="0.6"/>
  <rect x="27" y="33" width="7" height="6" rx="1" ry="1" fill="#339af0" opacity="0.6"/>
  <rect x="36" y="33" width="7" height="6" rx="1" ry="1" fill="#fcc419" opacity="0.6"/>
  <rect x="45" y="33" width="7" height="6" rx="1" ry="1" fill="#cc5de8" opacity="0.6"/>
  <!-- Space bar with rainbow gradient -->
  <rect x="14" y="41" width="36" height="5" rx="1" ry="1" fill="url(#glow)" opacity="0.8"/>
  <!-- Glow under keyboard (subtle) -->
  <rect x="8" y="49" width="48" height="2" rx="1" ry="1" fill="url(#glow)" opacity="0.3"/>
</svg>
